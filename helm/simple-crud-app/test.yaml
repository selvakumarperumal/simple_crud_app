apiVersion: v1
kind: Service
metadata:
  name: test-simple-crud-app
  labels:
    helm.sh/chart: simple-crud-app-0.1.0
    app.kubernetes.io/name: simple-crud-app
    app.kubernetes.io/instance: test
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: simple-crud-app
    app.kubernetes.io/instance: test
---
# Source: simple-crud-app/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-simple-crud-app
  labels:
    helm.sh/chart: simple-crud-app-0.1.0
    app.kubernetes.io/name: simple-crud-app
    app.kubernetes.io/instance: test
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: simple-crud-app
      app.kubernetes.io/instance: test
  template:
    metadata:
      labels:
        app.kubernetes.io/name: simple-crud-app
        app.kubernetes.io/instance: test
    spec:
      initContainers:
        - name: wait-for-pg
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z crud-db-rw 5432; do echo waiting for postgres; sleep 2; done"]
      containers:
        - name: simple-crud-app
          image: "simple-crud-app:latest"
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: PG_URI
              valueFrom:
                secretKeyRef:
                  name: crud-db-app
                  key: uri
            - name: DATABASE_URL
              value: $(PG_URI)
          command: ["sh", "-c", "export DATABASE_URL=$(echo $DATABASE_URL | sed 's|^postgres://|postgresql+asyncpg://|' | sed 's|^postgresql://|postgresql+asyncpg://|'); exec uvicorn app.main:app --host 0.0.0.0 --port 8000"]
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
---
