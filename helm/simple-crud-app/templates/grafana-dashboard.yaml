{{- if .Values.monitoring.grafana.dashboards.enabled }}
{{- $fullname := include "simple-crud-app.fullname" . -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $fullname }}-dashboard
  labels:
    {{- include "simple-crud-app.labels" . | nindent 4 }}
    grafana_dashboard: "1"
data:
  fastapi-crud.json: |
    {
      "description": "Comprehensive monitoring dashboard for the FastAPI CRUD application. Displays golden signals (traffic, latency, errors), pod logs, and CloudNativePG database metrics.",
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "title": "Request Rate (req/s)",
          "description": "Shows the rate of incoming HTTP requests per second, broken down by HTTP method, handler, and response status code. Useful for identifying traffic spikes or drops.",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(rate(http_request_duration_seconds_count{service=\"{{ $fullname }}\"}[5m])) by (method, handler, status)",
              "legendFormat": "{{`{{method}}`}} {{`{{handler}}`}} {{`{{status}}`}}"
            }
          ]
        },
        {
          "title": "Request Duration (p95)",
          "description": "Displays the 95th percentile response time for HTTP requests by handler. Indicates that 95% of requests are completed within this duration. High values point to performance bottlenecks in specific endpoints.",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{service=\"{{ $fullname }}\"}[5m])) by (le, handler))",
              "legendFormat": "{{`{{handler}}`}} p95"
            }
          ]
        },
        {
          "title": "Total Requests",
          "description": "Shows the total number of HTTP requests received by the application. Provides a quick count of overall traffic volume.",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "noValue": "0"
            }
          },
          "targets": [
            {
              "expr": "sum(http_requests_total{service=\"{{ $fullname }}\"})"
            }
          ]
        },
        {
          "title": "Error Rate (5xx)",
          "description": "Displays the rate of server-side (5xx) errors over the last 5 minutes. Spikes indicate application crashes, unhandled exceptions, or systemic issues preventing successful request processing.",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "noValue": "0"
            }
          },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{service=\"{{ $fullname }}\", status=~\"5..\"}[5m])) or vector(0)"
            }
          ]
        },
        {
          "title": "Pod Logs",
          "description": "Displays real-time logs from the application pods, fetched via Loki. Essential for debugging errors or correlating metric anomalies with specific log events.",
          "type": "logs",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 12 },
          "targets": [
            {
              "expr": "{namespace=\"{{ .Release.Namespace }}\", pod=~\"{{ $fullname }}.*\"}",
              "refId": "A"
            }
          ],
          "options": {
            "showTime": true,
            "sortOrder": "Descending",
            "enableLogDetails": true
          },
          "datasource": { "type": "loki" }
        },
        {
          "title": "CNPG — Transactions per Second",
          "description": "Shows the rate of committed transactions per second in the CloudNativePG database (crud_db). Indicates the database write and commit workload.",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 20 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(rate(cnpg_pg_stat_database_xact_commit{datname=\"crud_db\"}[5m])) or vector(0)",
              "legendFormat": "commits/s"
            }
          ]
        },
        {
          "title": "CNPG — Replication Lag (bytes)",
          "description": "Monitors the replication lag between the primary and standby nodes in the CloudNativePG cluster in bytes. High lag can indicate network issues, disk I/O bottlenecks, or an overloaded standby.",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 20 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "max(cnpg_pg_replication_lag{namespace=\"{{ .Release.Namespace }}\"}) or vector(0)",
              "legendFormat": "replication lag"
            }
          ]
        }
      ],
      "schemaVersion": 39,
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "title": "FastAPI CRUD App",
      "uid": "fastapi-crud-app"
    }
{{- end }}
