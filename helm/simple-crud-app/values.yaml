replicaCount: 2

image:
  repository: simple-crud-app
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

ingress:
  enabled: false
  className: nginx
  hosts:
    - host: crud-app.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

cnpg:
  enabled: true
  instances: 2
  database: crud_db
  owner: app
  storage:
    size: 1Gi
    storageClass: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi
  monitoring:
    enabled: false

monitoring:
  serviceMonitor:
    enabled: false
    interval: 15s
    additionalLabels: {}
  grafana:
    dashboards:
      enabled: false
  loki:
    datasource:
      enabled: false
      url: http://loki:3100
      grafanaNamespace: monitoring
    dashboards:
      enabled: false
